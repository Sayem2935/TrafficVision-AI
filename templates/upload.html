{% extends "base.html" %}
{% block title %}Upload Video | Traffic Violation AI{% endblock %}

{% block content %}

<!-- LOADING OVERLAY -->
<div id="loadingOverlay">
    <div class="loader-box">
        <div class="spinner"></div>
        <h3>AI Processing Video</h3>
        <p>Analyzing traffic violations & generating evidence...</p>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card p-4 shadow-lg">

            <h2 class="mb-3">Upload Traffic Video</h2>

            <p class="text-muted">
                Upload an offline traffic video for helmet violation analysis.
            </p>

            <form method="POST" enctype="multipart/form-data" onsubmit="showLoader()">
                <div class="mb-4">
                    <label class="form-label fw-semibold">Select Video File</label>
                    <input type="file" name="video" class="form-control form-control-lg" accept="video/*" required>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100">
                    🚀 Start AI Analysis
                </button>
            </form>

        </div>
    </div>
</div>

<script>
function showLoader() {
    document.getElementById("loadingOverlay").style.display = "flex";
}
</script>

{% endblock %}
